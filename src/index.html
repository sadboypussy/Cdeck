<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no" />
    <title>VISUAL-CORE-77</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div class="ambient-bg"></div>

    <div class="device" id="device">
      <div class="device-noise" aria-hidden="true"></div>

      <header class="topbar">
        <div class="topbar-id">VISUAL-CORE <span>/ 77</span></div>
        <div class="topbar-status" id="reactivity-indicator" title="Ctrl+Shift+D debug audio">
          <span class="pulse-dot"></span> LIVE
        </div>
        <div class="topbar-clock" id="clock">--:--</div>
      </header>

      <section class="audio-tier" id="audio-tier">
        <canvas class="ambient-canvas" id="ambient-canvas" aria-hidden="true"></canvas>
        <div class="video-shell">
          <div class="scanner-frame crt-active">
            <div id="yt-player" class="yt-player"></div>
            <div class="video-fallback" id="video-fallback">
              <div class="video-fallback-pulse" aria-hidden="true"></div>
              <p class="video-fallback-title">Ambiance audio</p>
              <p class="video-fallback-sub">Lance ta musique ailleurs (Spotify, navigateur…) — l'interface capte le <strong>son système</strong> via WASAPI.</p>
            </div>
            <div class="scanner-overlay"></div>
            <div class="frame-sheen" aria-hidden="true"></div>
            <canvas class="crt-canvas" id="crt-canvas" aria-hidden="true"></canvas>
            <div class="now-tag">NOW PLAYING</div>
          </div>
        </div>

        <div class="track-row">
          <div class="track-title" id="track-title">En attente</div>
          <div class="track-sub" id="track-sub">▶ pour lancer · ou musique système</div>
        </div>

        <div class="audio-wave" id="audio-wave" aria-hidden="true"></div>

        <div class="controls-row">
          <button class="icon-btn" id="btn-prev" title="Précédent" type="button">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 5v14M18 5L8 12l10 7V5z" fill="currentColor" />
            </svg>
          </button>
          <button class="icon-btn icon-btn-primary" id="btn-play" title="Play/Pause" type="button">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7 4l13 8-13 8V4z" fill="currentColor" />
            </svg>
          </button>
          <button class="icon-btn" id="btn-next" title="Suivant" type="button">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M18 5v14M6 5l10 7L6 19V5z" fill="currentColor" />
            </svg>
          </button>
          <label class="volume">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
              <path d="M4 9v6h4l5 4V5L8 9H4z" />
              <path d="M16 9a4 4 0 0 1 0 6" stroke-linecap="round" />
            </svg>
            <input type="range" id="volume" min="0" max="100" value="60" />
          </label>
        </div>
      </section>

      <div class="tabs">
        <div class="tabs-track" id="tabs-track">
          <div class="tab-indicator" aria-hidden="true"></div>
          <button class="tab active" data-tab="notes" id="tab-notes" type="button">Notes</button>
          <button class="tab" data-tab="proximity" id="tab-proximity" type="button">Proximité</button>
        </div>
      </div>

      <main class="workzone">
        <div class="workzone-glitch" id="workzone-glitch" aria-hidden="true"></div>
        <div class="panel panel-notes active" id="panel-notes">
          <div class="editor-wrap">
            <div class="editor-backdrop" id="editor-backdrop" aria-hidden="true"></div>
            <textarea class="editor" id="editor" spellcheck="false" placeholder="# Nouvelle note…"></textarea>
          </div>
          <div class="notes-footer">
            <div class="tags-bar" id="tags-bar"></div>
            <button type="button" class="btn-save" id="btn-save-note" disabled title="Ctrl+S">
              Enregistrer
            </button>
          </div>
        </div>

        <div class="panel panel-proximity" id="panel-proximity">
          <div class="proximity-stage">
            <aside class="proximity-fade proximity-fade-left" id="proximity-fade-left" aria-label="Suggestions gauche"></aside>
            <div class="proximity-center" id="proximity-grid"></div>
            <aside class="proximity-fade proximity-fade-right" id="proximity-fade-right" aria-label="Suggestions droite"></aside>
          </div>
          <p class="proximity-meta" id="proximity-meta"></p>
        </div>
      </main>

      <footer class="statusbar">
        <span id="cursor-pos">Ln 1, Col 1</span>
        <span id="sync-status" class="status-ok">Synced · v0.2</span>
      </footer>
    </div>

    <div class="hud-overlay hidden" id="hud">
      <div class="hud-panel">
        <div class="hud-header">Palette · Ctrl+P</div>
        <input type="text" class="hud-input" id="hud-input" placeholder="Rechercher ou nommer une note…" autocomplete="off" />
        <ul class="hud-results" id="hud-results"></ul>
      </div>
    </div>

    <div class="debug-vu hidden" id="debug-vu" aria-hidden="true">
      <div class="debug-vu-label">DEBUG VU — Ctrl+Shift+D</div>
      <label class="debug-intensity">
        INT
        <input type="range" id="debug-intensity" min="25" max="150" value="55" />
      </label>
      <div class="debug-vu-bars" id="debug-vu-bars"></div>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
