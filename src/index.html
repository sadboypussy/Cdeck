<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no" />
    <title>VISUAL-CORE-77</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body class="posture-draft music-expanded">
    <div class="ambient-bg"></div>

    <div class="device" id="device">
      <header class="topbar">
        <div class="topbar-id">VISUAL-CORE <span>/ 77</span></div>
        <div class="topbar-status" id="reactivity-indicator" title="Ctrl+Shift+D · debug audio">
          <span class="pulse-dot"></span> LIVE
        </div>
        <span class="posture-badge" id="posture-badge" title="Tab · Navigate · Échap · Draft">Draft</span>
      </header>

      <main class="workzone" id="workzone">
        <div class="note-surface">
          <aside class="proximity-rail proximity-rail-left" id="proximity-rail-left" aria-label="Notes proches à gauche"></aside>

          <div class="note-center">
            <div class="editor-shell" id="editor-shell">
              <div class="editor-wrap" id="editor-wrap">
                <div class="editor-backdrop" id="editor-backdrop" aria-hidden="true"></div>
                <textarea class="editor" id="editor" spellcheck="false" placeholder="# Nouvelle note…"></textarea>
                <div class="read-view hidden" id="read-view" aria-label="Lecture"></div>
                <ul class="wikilink-ac hidden" id="wikilink-ac" role="listbox"></ul>
              </div>
              <div class="notes-footer">
                <div class="tags-bar" id="tags-bar"></div>
                <div class="notes-actions">
                  <button type="button" class="btn-ghost" id="btn-read-mode" title="Ctrl+E">Lire</button>
                  <button type="button" class="btn-save" id="btn-save-note" disabled title="Ctrl+S">Enregistrer</button>
                </div>
              </div>
            </div>

            <div class="proximity-ribbon hidden" id="proximity-ribbon" aria-label="Suggestions"></div>
          </div>

          <aside class="proximity-rail proximity-rail-right" id="proximity-rail-right" aria-label="Notes proches à droite"></aside>
        </div>
      </main>

      <section class="music-band" id="music-band" aria-label="Réactivité audio">
        <div class="music-band-main">
          <span class="audio-status" id="audio-status" aria-live="polite">Silence</span>
          <div class="audio-wave" id="audio-wave" aria-hidden="true"></div>
          <time class="music-clock" id="music-clock">--:--</time>
          <button class="icon-btn icon-btn-sm" id="btn-music-collapse" type="button" title="Replier la bande">▾</button>
        </div>
      </section>

      <footer class="statusbar">
        <span id="cursor-pos">Ln 1, Col 1</span>
        <span id="sync-status" class="status-ok">Synced</span>
      </footer>
    </div>

    <div class="proximity-focus hidden" id="proximity-focus" role="dialog" aria-label="Focus proximité">
      <div class="proximity-focus-backdrop" id="proximity-focus-backdrop"></div>
      <div class="proximity-focus-panel">
        <header class="proximity-focus-header">
          <span>Proximité</span>
          <span class="proximity-focus-hint">Flèches · Entrée · Échap</span>
        </header>
        <div class="proximity-stage">
          <aside class="proximity-fade proximity-fade-left" id="proximity-fade-left"></aside>
          <div class="proximity-center" id="proximity-grid"></div>
          <aside class="proximity-fade proximity-fade-right" id="proximity-fade-right"></aside>
        </div>
        <p class="proximity-meta" id="proximity-meta"></p>
      </div>
    </div>

    <div class="hud-overlay hidden" id="hud">
      <div class="hud-panel">
        <div class="hud-header">Palette · Ctrl+P</div>
        <input type="text" class="hud-input" id="hud-input" placeholder="Rechercher ou nommer une note…" autocomplete="off" />
        <ul class="hud-results" id="hud-results"></ul>
      </div>
    </div>

    <div class="debug-vu hidden" id="debug-vu" aria-hidden="true">
      <div class="debug-vu-label">DEBUG VU — Ctrl+Shift+D</div>
      <label class="debug-intensity">
        INT
        <input type="range" id="debug-intensity" min="25" max="150" value="55" />
      </label>
      <div class="debug-vu-bars" id="debug-vu-bars"></div>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
