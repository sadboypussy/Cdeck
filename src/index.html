<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VISUAL-CORE-77</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/main.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div class="ambient-bg"></div>

    <div class="device" id="device">
      <div class="device-noise" aria-hidden="true"></div>
      <span class="bracket bracket-tl"></span>
      <span class="bracket bracket-tr"></span>
      <span class="bracket bracket-bl"></span>
      <span class="bracket bracket-br"></span>

      <header class="topbar glass-bar">
        <span class="topbar-label">VISUAL-CORE-77</span>
        <span class="topbar-status" id="reactivity-indicator" title="Ctrl+Shift+D debug audio">
          <span class="pulse-dot"></span> REACT
        </span>
        <span class="topbar-clock" id="clock">--:--</span>
      </header>

      <section class="audio-tier glass-panel" id="audio-tier">
        <canvas class="ambient-canvas" id="ambient-canvas" aria-hidden="true"></canvas>
        <div class="scanner-frame glass-inset crt-active">
          <div id="yt-player" class="yt-player"></div>
          <div class="scanner-overlay"></div>
          <canvas class="crt-canvas" id="crt-canvas" aria-hidden="true"></canvas>
          <div class="scanner-corners"></div>
        </div>
        <div class="track-info">
          <div class="data-stream" id="track-title">DATA_STREAM // SYREX NIGHTCORE</div>
        </div>
        <div class="terminal-controls">
          <button class="term-btn glass-btn" id="btn-prev" title="Précédent">◀◀</button>
          <button class="term-btn glass-btn term-btn-primary" id="btn-play" title="Play/Pause">▶</button>
          <button class="term-btn glass-btn" id="btn-next" title="Suivant">▶▶</button>
          <input type="range" class="volume-slider" id="volume" min="0" max="100" value="60" />
        </div>
      </section>

      <nav class="tabswitch glass-bar">
        <button class="tab active" data-tab="notes" id="tab-notes">
          <span class="tab-glow"></span> NOTES
        </button>
        <button class="tab" data-tab="radar" id="tab-radar">
          <span class="tab-glow"></span> RADAR
        </button>
      </nav>

      <main class="workzone">
        <div class="workzone-glitch" id="workzone-glitch" aria-hidden="true"></div>
        <div class="panel panel-notes active" id="panel-notes">
          <div class="editor-wrap glass-inset">
            <div class="editor-backdrop" id="editor-backdrop" aria-hidden="true"></div>
            <textarea class="editor" id="editor" spellcheck="false" placeholder="# Nouvelle note…"></textarea>
          </div>
          <div class="tags-bar glass-bar" id="tags-bar"></div>
        </div>

        <div class="panel panel-radar" id="panel-radar">
          <canvas id="radar-canvas" class="radar-canvas"></canvas>
          <div class="radar-hud">
            <div class="radar-hud-title">PROXIMITY SCAN</div>
            <div class="radar-hud-node" id="radar-active-label">—</div>
          </div>
          <div class="radar-empty hidden" id="radar-empty">
            Aucun voisin — ajoute des liens <code>[[Note]]</code>
          </div>
          <div class="radar-overflow hidden" id="radar-overflow"></div>
        </div>
      </main>

      <footer class="statusbar glass-bar">
        <span id="cursor-pos">LN 1 · COL 1</span>
        <span id="sync-status">SYNC OK</span>
        <span>v0.2</span>
      </footer>
    </div>

    <div class="hud-overlay hidden" id="hud">
      <div class="hud-panel glass-panel">
        <div class="hud-header">⌘ PALETTE — Ctrl+P · créer une note</div>
        <input type="text" class="hud-input" id="hud-input" placeholder="Rechercher ou nommer une note…" autocomplete="off" />
        <ul class="hud-results" id="hud-results"></ul>
      </div>
    </div>

    <div class="debug-vu hidden glass-panel" id="debug-vu" aria-hidden="true">
      <div class="debug-vu-label">DEBUG VU — Ctrl+Shift+D</div>
      <label class="debug-intensity">
        INT
        <input type="range" id="debug-intensity" min="25" max="200" value="100" />
      </label>
      <div class="debug-vu-bars" id="debug-vu-bars"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script type="module" src="main.js"></script>
  </body>
</html>
